DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werwolf - Pass & Play</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 450px;
      width: 100%;
    }
    .card {
      background-color: #1e1e1e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    h1 { color: #e94560; margin-top: 0; text-align: center; }
    h2 { color: #00adb5; font-size: 1.2rem; margin-top: 0; }
    
    /* Zahler-Zeilen */
    .role-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
      background: #2a2a2a;
      padding: 10px 14px;
      border-radius: 10px;
    }
    input[type="number"], input[type="text"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #333;
      color: #fff;
      font-size: 1rem;
    }
    .role-row input[type="number"] { width: 60px; text-align: center; }
    input[type="text"] { width: 100%; margin-bottom: 10px; }

    /* Schieberegler (Toggle Switch) */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444;
      transition: .3s;
      border-radius: 28px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #00adb5; }
    input:checked + .slider:before { transform: translateX(22px); }

    button {
      background-color: #e94560;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    button:active { background-color: #c0354d; }

    /* Scroll-Liste für Karten */
    .player-card {
      background: #252a34;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .player-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 8px;
      color: #fff;
    }
    .secret-box {
      background: #181920;
      border: 1px dashed #00adb5;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
      cursor: pointer;
    }
    .role-title {
      font-size: 1.4rem;
      color: #4ecca3;
      font-weight: bold;
      display: none;
    }
    .tap-hint {
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🐺 Werwolf</h1>

  <!-- Schritt 1: Rollen -->
  <div id="step1" class="card">
    <h2>1. Rollen wählen</h2>
    
    <!-- Mehrfache Rollen -->
    <div class="role-row">
      <span>Werwolf 🐺</span>
      <input type="number" id="count-werwolf" value="2" min="0" onchange="updateTotal()">
    </div>
    <div class="role-row">
      <span>Dorfbewohner 👨‍🌾</span>
      <input type="number" id="count-dorf" value="2" min="0" onchange="updateTotal()">
    </div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">

    <!-- Sonderrollen (An/Aus) -->
    <div class="role-row">
      <span>Seherin 🔮</span>
      <label class="switch">
        <input type="checkbox" id="toggle-seherin" checked onchange="updateTotal()">
        <span class="slider"></span>
      </label>
    </div>
    <div class="role-row">
      <span>Hexe 🧪</span>
      <label class="switch">
        <input type="checkbox" id="toggle-hexe" checked onchange="updateTotal()">
        <span class="slider"></span>
      </label>
    </div>
    <div class="role-row">
      <span>Amor 💘</span>
      <label class="switch">
        <input type="checkbox" id="toggle-amor" onchange="updateTotal()">
        <span class="slider"></span>
      </label>
    </div>
    <div class="role-row">
      <span>Jäger 🏹</span>
      <label class="switch">
        <input type="checkbox" id="toggle-jaeger" onchange="updateTotal()">
        <span class="slider"></span>
      </label>
    </div>

    <p id="total-info" style="text-align: center; color: #aaa;">Gesamtanzahl: 6 Rollen</p>
    <button onclick="goToStep2()">Weiter zu den Spielern</button>
  </div>

  <!-- Schritt 2: Namen -->
  <div id="step2" class="card" style="display: none;">
    <h2>2. Spielernamen</h2>
    <div id="player-inputs"></div>
    <button onclick="startGame()">Rollen verteilen</button>
  </div>

  <!-- Schritt 3: Scroll-Karten -->
  <div id="step3" style="display: none;">
    <div style="text-align: center; margin-bottom: 15px; color: #aaa;">
      👇 Scrollt nach unten & tippt auf eure Karte!
    </div>
    <div id="cards-container"></div>
    <button onclick="location.reload()" style="margin-top: 20px; background-color: #333;">Neues Spiel starten</button>
  </div>
</div>

<script>
  let rolesList = [];

  function updateTotal() {
    let count = (parseInt(document.getElementById('count-werwolf').value) || 0) +
                (parseInt(document.getElementById('count-dorf').value) || 0);
    
    if(document.getElementById('toggle-seherin').checked) count++;
    if(document.getElementById('toggle-hexe').checked) count++;
    if(document.getElementById('toggle-amor').checked) count++;
    if(document.getElementById('toggle-jaeger').checked) count++;

    document.getElementById('total-info').innerText = `Gesamtanzahl: ${count} Rollen`;
  }

  function goToStep2() {
    rolesList = [];
    
    // Mehrfache Rollen hinzufügen
    for(let i=0; i < (parseInt(document.getElementById('count-werwolf').value)||0); i++) rolesList.push('Werwolf 🐺');
    for(let i=0; i < (parseInt(document.getElementById('count-dorf').value)||0); i++) rolesList.push('Dorfbewohner 👨‍🌾');
    
    // Sonderrollen einzeln hinzufügen
    if(document.getElementById('toggle-seherin').checked) rolesList.push('Seherin 🔮');
    if(document.getElementById('toggle-hexe').checked) rolesList.push('Hexe 🧪');
    if(document.getElementById('toggle-amor').checked) rolesList.push('Amor 💘');
    if(document.getElementById('toggle-jaeger').checked) rolesList.push('Jäger 🏹');

    if(rolesList.length === 0) {
      alert("Bitte wähle mindestens 1 Rolle aus!");
      return;
    }

    // Rollen mischen
    for (let i = rolesList.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [rolesList[i], rolesList[j]] = [rolesList[j], rolesList[i]];
    }

    // Input-Felder erstellen
    const container = document.getElementById('player-inputs');
    container.innerHTML = '';
    for(let i = 0; i < rolesList.length; i++) {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = `Spieler ${i+1}`;
      input.id = `name-${i}`;
      container.appendChild(input);
    }

    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
  }

  function startGame() {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    for(let i = 0; i < rolesList.length; i++) {
      let name = document.getElementById(`name-${i}`).value.trim();
      if(!name) name = `Spieler ${i+1}`;

      const card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = `
        <div class="player-name">${name}</div>
        <div class="secret-box" onclick="toggleCard(this)">
          <span class="tap-hint">👁️ Tippen zum Aufdecken</span>
          <span class="role-title">${rolesList[i]}</span>
        </div>
      `;
      container.appendChild(card);
    }

    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
  }

  function toggleCard(box) {
    const hint = box.querySelector('.tap-hint');
    const role = box.querySelector('.role-title');

    if (role.style.display === 'none' || role.style.display === '') {
      role.style.display = 'inline';
      hint.style.display = 'none';
      box.style.borderColor = '#e94560';
    } else {
      role.style.display = 'none';
      hint.style.display = 'inline';
      box.style.borderColor = '#00adb5';
    }
  }

  // Initialisieren
  updateTotal();
</script>

</body>
</html>
